{{- /* Custom head additions */ -}}
<style>
.home-banner {
    margin: 0 0 var(--gap) 0;
}
.home-banner img {
    display: block;
    width: 100%;
    height: auto;
    max-height: 380px;
    object-fit: cover;
    object-position: center;
    border-radius: var(--radius);
}

.home-social {
    margin: 0 0 var(--gap) 0;
}
.home-social .social-icons {
    padding: 0;
}
.home-social .social-icons a:first-of-type {
    padding-inline-start: 0;
}

/* ---------------------------------------------------------------- */
/* Listing styles. Controlled by params.listStyle in hugo.toml:     */
/*   "full"        — full-width cover above the post text (default) */
/*   "thumb-left"  — small thumbnail on the left, text on the right */
/*   "thumb-right" — small thumbnail on the right, text on the left */
/* ---------------------------------------------------------------- */

/* Show cover images on tag/term listing pages too (theme hides them by default) */
.tag-entry .entry-cover {
    display: flex;
}

/* Style: thumb-left / thumb-right share a horizontal layout */
.list-style-thumb-left,
.list-style-thumb-right {
    display: flex;
    align-items: center;
    gap: var(--gap);
}
.list-style-thumb-left .entry-cover,
.list-style-thumb-right .entry-cover {
    flex: 0 0 160px;
    margin: 0;
}
.list-style-thumb-left .entry-cover img,
.list-style-thumb-right .entry-cover img {
    width: 160px;
    height: 110px;
    object-fit: cover;
    border-radius: var(--radius);
}
.list-style-thumb-left .entry-body,
.list-style-thumb-right .entry-body {
    flex: 1 1 auto;
    min-width: 0;
}
.list-style-thumb-right {
    flex-direction: row-reverse;
}

/* On narrow viewports, fall back to stacked layout */
@media (max-width: 600px) {
    .list-style-thumb-left,
    .list-style-thumb-right {
        flex-direction: column;
        align-items: stretch;
    }
    .list-style-thumb-left .entry-cover,
    .list-style-thumb-right .entry-cover {
        flex: 0 0 auto;
    }
    .list-style-thumb-left .entry-cover img,
    .list-style-thumb-right .entry-cover img {
        width: 100%;
        height: auto;
    }
}

/* ---------------------------------------------------------------- */
/* "On this day" — same calendar day in other years, below each post */
/* ---------------------------------------------------------------- */
.on-this-day {
    margin-top: calc(var(--gap) * 2);
    padding-top: var(--gap);
    border-top: 1px solid var(--border);
}
.on-this-day h3 {
    margin: 0 0 calc(var(--gap) / 2) 0;
    font-size: 1rem;
    color: var(--secondary);
}
.on-this-day ul {
    margin: 0;
    padding: 0;
    list-style: none;
}
.on-this-day li {
    display: flex;
    gap: 0.6em;
    padding: 0.2em 0;
    line-height: 1.5;
}
.on-this-day time {
    flex: 0 0 3.2em;
    color: var(--secondary);
    font-variant-numeric: tabular-nums;
}
.on-this-day a {
    color: var(--content);
    box-shadow: 0 1px 0 0 var(--primary);
}
.on-this-day a:hover {
    box-shadow: none;
}
</style>
